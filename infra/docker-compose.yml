# Skill Shots — local dev infra.
# Usage:
#   pnpm infra:up      → start all
#   pnpm infra:down    → stop
#   pnpm infra:reset   → wipe volumes and restart (DESTRUCTIVE)

services:
  postgres:
    image: postgres:16-alpine
    container_name: skillshots-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: skillshots
      POSTGRES_PASSWORD: skillshots
      POSTGRES_DB: skillshots
      # Citext is used for case-insensitive email — it's in postgres-contrib.
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillshots -d skillshots"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: skillshots-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot job: create the videos bucket on first up.
  minio-init:
    image: minio/mc:latest
    container_name: skillshots-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      (mc mb -p local/skillshots-videos || true) &&
      mc anonymous set download local/skillshots-videos &&
      echo 'minio bucket ready'"
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: skillshots-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  redis_data:
