name: api-ci

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared-types/**"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - "packages/shared-types/**"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/api-ci.yml"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: skillshots
          POSTGRES_PASSWORD: skillshots
          POSTGRES_DB: skillshots
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U skillshots"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://skillshots:skillshots@localhost:5432/skillshots?schema=public
      JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
      JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET || 'bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb' }}
      CORS_ORIGINS: http://localhost:8081
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: us-east-1
      S3_BUCKET: ci-bucket
      S3_ACCESS_KEY: ci
      S3_SECRET_KEY: ci-secret
      S3_PUBLIC_HOSTS: cdn.example.com
      ALLOWED_VIDEO_MIME: video/mp4,video/webm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skill-shots/shared-types build
      - run: pnpm --filter @skill-shots/api prisma generate
      - run: pnpm --filter @skill-shots/api typecheck
      - run: pnpm --filter @skill-shots/api test
      - name: pnpm audit (non-blocking on PRs)
        run: pnpm audit --audit-level=high
        continue-on-error: ${{ github.event_name == 'pull_request' }}
